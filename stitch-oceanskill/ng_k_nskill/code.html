<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop relative overflow-hidden">
<!-- Ambient Glowing Orbs Background -->
<div class="absolute top-0 left-1/4 w-96 h-96 bg-primary-container/20 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-0 right-1/4 w-[500px] h-[500px] bg-secondary-container/10 rounded-full blur-[150px] pointer-events-none"></div>
<!-- Registration Canvas (Suppressed TopNavBar & Footer due to transactional intent) -->
<main class="w-full max-w-[480px] z-10 relative">
<!-- Glassmorphism Card -->
<div class="bg-white/[0.03] backdrop-blur-[20px] border border-white/10 rounded-xl p-8 shadow-2xl relative overflow-hidden">
<!-- Subtle inner top edge highlight -->
<div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-primary/30 to-transparent"></div>
<!-- Header -->
<div class="text-center mb-8">
<h1 class="font-display-lg text-display-lg text-primary mb-2 tracking-tighter">nskill</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Tham gia nền tảng trí tuệ nhân tạo cao cấp.</p>
</div>
<!-- Form -->
<form action="#" class="space-y-5" method="POST">
<!-- Field: Họ tên -->
<div>
<label class="font-label-sm text-label-sm text-on-surface-variant block mb-1 uppercase tracking-wider" for="fullname">Họ tên</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors">person</span>
<input class="w-full bg-[#050608] border border-outline-variant rounded-lg py-3 px-4 pl-12 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline-variant/50" id="fullname" name="fullname" placeholder="Nhập họ và tên của bạn" required="" type="text"/>
</div>
</div>
<!-- Field: Email -->
<div>
<label class="font-label-sm text-label-sm text-on-surface-variant block mb-1 uppercase tracking-wider" for="email">Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full bg-[#050608] border border-outline-variant rounded-lg py-3 px-4 pl-12 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline-variant/50" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<!-- Field: Mật khẩu -->
<div>
<label class="font-label-sm text-label-sm text-on-surface-variant block mb-1 uppercase tracking-wider" for="password">Mật khẩu</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-[#050608] border border-outline-variant rounded-lg py-3 px-4 pl-12 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline-variant/50" id="password" name="password" placeholder="Tạo mật khẩu mạnh" required="" type="password"/>
</div>
</div>
<!-- Field: Xác nhận mật khẩu -->
<div>
<label class="font-label-sm text-label-sm text-on-surface-variant block mb-1 uppercase tracking-wider" for="confirm_password">Xác nhận mật khẩu</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors">lock_reset</span>
<input class="w-full bg-[#050608] border border-outline-variant rounded-lg py-3 px-4 pl-12 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline-variant/50" id="confirm_password" name="confirm_password" placeholder="Nhập lại mật khẩu" required="" type="password"/>
</div>
</div>
<!-- Checkbox: Terms & Privacy -->
<div class="flex items-start gap-3 pt-2">
<div class="flex items-center h-5 mt-1">
<input class="w-4 h-4 rounded border-outline-variant bg-[#050608] text-primary focus:ring-primary focus:ring-offset-background focus:ring-offset-2 transition-colors cursor-pointer" id="terms" name="terms" required="" type="checkbox"/>
</div>
<label class="font-body-md text-body-md text-on-surface-variant cursor-pointer" for="terms">
                        Tôi đồng ý với các <a class="text-primary hover:text-primary-fixed transition-colors" href="#">Điều khoản dịch vụ</a> và <a class="text-primary hover:text-primary-fixed transition-colors" href="#">Chính sách bảo mật</a> của nskill.
                    </label>
</div>
<!-- Submit Action -->
<div class="pt-4">
<button class="w-full flex items-center justify-center gap-2 bg-primary text-on-primary font-headline-md text-headline-md py-3 px-6 rounded-lg hover:bg-primary-fixed transition-all shadow-[inset_0_1px_0_rgba(255,255,255,0.2)]" type="submit">
<span>Đăng ký</span>
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0, 'wght' 600;">arrow_forward</span>
</button>
</div>
</form>
<!-- Footer Link -->
<div class="mt-8 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Đã có tài khoản? 
                    <a class="text-primary font-bold hover:text-primary-fixed transition-colors ml-1" href="#">Đăng nhập</a>
</p>
