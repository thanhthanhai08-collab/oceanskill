<!DOCTYPE html>

<html class="dark" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - nskill</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@600;700&amp;family=Inter:wght@400&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed": "#dde1ff",
                        "tertiary-fixed-dim": "#00dce5",
                        "tertiary": "#00dce5",
                        "error-container": "#93000a",
                        "on-secondary-container": "#e5a9ff",
                        "on-secondary": "#510074",
                        "surface-container-lowest": "#0c0e14",
                        "tertiary-container": "#00797e",
                        "primary": "#b8c3ff",
                        "on-tertiary-fixed": "#002021",
                        "surface-container-highest": "#33343b",
                        "on-tertiary-container": "#bbfbff",
                        "on-error-container": "#ffdad6",
                        "primary-fixed-dim": "#b8c3ff",
                        "on-tertiary-fixed-variant": "#004f53",
                        "surface-container-high": "#282a30",
                        "surface-bright": "#373940",
                        "on-primary-fixed-variant": "#0035be",
                        "secondary": "#e9b3ff",
                        "on-primary-fixed": "#001356",
                        "surface-tint": "#b8c3ff",
                        "surface-container-low": "#191b22",
                        "on-secondary-fixed": "#310048",
                        "outline": "#8e90a2",
                        "error": "#ffb4ab",
                        "secondary-container": "#7d01b1",
                        "on-secondary-fixed-variant": "#7200a3",
                        "on-tertiary": "#003739",
                        "surface-variant": "#33343b",
                        "primary-container": "#2e5bff",
                        "inverse-on-surface": "#2e3037",
                        "background": "#111319",
                        "outline-variant": "#434656",
                        "tertiary-fixed": "#63f7ff",
                        "surface-dim": "#111319",
                        "on-surface-variant": "#c4c5d9",
                        "secondary-fixed-dim": "#e9b3ff",
                        "on-error": "#690005",
                        "secondary-fixed": "#f6d9ff",
                        "on-surface": "#e2e2eb",
                        "inverse-primary": "#124af0",
                        "on-background": "#e2e2eb",
                        "surface-container": "#1e1f26",
                        "surface": "#111319",
                        "on-primary-container": "#efefff",
                        "inverse-surface": "#e2e2eb",
                        "on-primary": "#002388"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "max-width": "1440px",
                        "base-unit": "8px",
                        "margin-mobile": "16px",
                        "margin-desktop": "64px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "headline-md": ["Geist"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "display-lg": ["Geist"],
                        "display-lg-mobile": ["Geist"],
                        "label-sm": ["JetBrains Mono"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],

                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #0A0C12; /* Base Layer */
            color: #e2e2eb;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-field {
            background-color: #050608;
            border: 1px solid #434656;
            color: #e2e2eb;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: #b8c3ff;
            box-shadow: 0 0 0 1px #b8c3ff;
            outline: none;
        }
        .input-label {
            transition: all 0.3s ease;
        }
        .input-field:focus + .input-label,
        .input-field:not(:placeholder-shown) + .input-label {
            color: #ffffff;
        }
        
        .glow-border {
            position: relative;
            z-index: 0;
        }
        .glow-border::before {
            content: '';
            position: absolute;
            inset: -2px;
            z-index: -1;
            background: linear-gradient(45deg, #2e5bff, #e9b3ff);
            border-radius: inherit;
            filter: blur(8px);
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }
        .glow-border:hover::before {
            opacity: 0.8;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center font-body-md text-body-md px-margin-mobile md:px-margin-desktop bg-background text-on-background bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-surface-container-high/20 via-background to-background">
<!-- Decorative Background Elements -->
<div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
<div class="absolute top-1/4 left-1/4 w-[500px] h-[500px] bg-primary/5 rounded-full blur-[100px]"></div>
<div class="absolute bottom-1/4 right-1/4 w-[400px] h-[400px] bg-tertiary/5 rounded-full blur-[100px]"></div>
</div>
<!-- Main Container -->
<main class="w-full max-w-md">
<!-- Brand / Header -->
<div class="text-center mb-8">
<h1 class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg font-bold tracking-tighter text-primary mb-2">nskill</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Initialize your synthetic intelligence access.</p>
</div>
<!-- Login Card -->
<div class="glass-panel rounded-xl p-8 relative glow-border">
<form class="space-y-6">
<!-- Email Input -->
<div class="relative">
<label class="font-label-sm text-label-sm text-on-surface-variant mb-2 block" for="email">EMAIL IDENTIFIER</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" style="font-variation-settings: 'FILL' 0;">mail</span>
<input class="input-field w-full rounded-lg py-3 pl-10 pr-4 font-body-md text-body-md placeholder:text-outline-variant focus:ring-0" id="email" placeholder="operator@nskill.ai" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="relative">
<div class="flex justify-between items-center mb-2">
<label class="font-label-sm text-label-sm text-on-surface-variant block" for="password">SECURITY PROTOCOL</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-fixed transition-colors" href="#">Forgot key?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" style="font-variation-settings: 'FILL' 0;">lock</span>
<input class="input-field w-full rounded-lg py-3 pl-10 pr-4 font-body-md text-body-md placeholder:text-outline-variant focus:ring-0" id="password" placeholder="••••••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">visibility</span>
</button>
</div>
</div>
<!-- Submit Action -->
<button class="w-full bg-primary-container text-on-primary-container font-headline-md text-headline-md py-3 rounded-lg flex items-center justify-center gap-2 hover:bg-primary transition-all active:scale-95 duration-200 group relative overflow-hidden" type="submit">
<div class="absolute inset-x-0 top-0 h-px bg-white/20"></div>
<span>Authenticate</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 my-8">
<div class="h-px bg-white/10 flex-1"></div>
<span class="font-label-sm text-label-sm text-outline">EXTERNAL IDENTITY</span>
<div class="h-px bg-white/10 flex-1"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="glass-panel border border-white/10 rounded-lg py-3 flex items-center justify-center gap-2 hover:bg-surface-container-high transition-colors text-on-surface" type="button">
<!-- Placeholder for Google Icon -->
<span class="material-symbols-outlined text-on-surface-variant">account_circle</span>
<span class="font-body-md text-body-md">Google</span>
</button>
<button class="glass-panel border border-white/10 rounded-lg py-3 flex items-center justify-center gap-2 hover:bg-surface-container-high transition-colors text-on-surface" type="button">
<!-- Placeholder for GitHub Icon -->
<span class="material-symbols-outlined text-on-surface-variant">code</span>
<span class="font-body-md text-body-md">GitHub</span>
</button>
</div>
</div>
<!-- Signup Prompt -->
<div class="text-center mt-8">
<p class="font-body-md text-body-md text-on-surface-variant">
                No active profile? 
                <a class="text-primary font-bold hover:text-primary-fixed transition-colors underline decoration-primary/30 underline-offset-4" href="#">Register Operator</a>
</p>
</div>
</main>
</body></html>
